# Build VitePress under website/ and push to branch `gh-pages` for GitHub Pages.
# Uses branch publishing (not the GitHub Actions "Pages deployment" API) so it works
# when deploy-pages returns 404 (Pages API not provisioned for the repo).
#
# Site URL (project page): https://<owner>.github.io/<repo>/
name: Deploy docs (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Install and build
        working-directory: website
        env:
          VITEPRESS_BASE: /${{ github.event.repository.name }}/
        run: npm ci && npm run build
      - name: Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: website/.vitepress/dist
          force_orphan: true
